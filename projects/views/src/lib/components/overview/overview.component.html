<app-table #table
           [tableTitle]="'Rachunki'"
           [data]="OverviewBills()"
           [columnsDefinition]="columns"
           [editable]="true"
           [canAdd]="true"
           [showPasteButton]="false"
           [pageable]="false"
           [expandable]="true"
           (rowActivated)="onRowClicked($event)"
           (deleteButtonClicked)="deleteBill()"
           (editButtonClicked)="editBill()"
           (addButtonClicked)="addBill()"
           (refreshButtonClicked)="refresh()"
           (rowDblClick)="editBill()">

  <ng-template cellTemplateForColumn="name"
               let-row="row">
    <a [routerLink]="['/rachunek', row.id]"
       routerLinkActive="active">{{row.name}}</a>
  </ng-template>

  <ng-template cellTemplateForColumn="dueDate"
               let-row="row">
    <span [billDueColor]="row.dueDate">
      {{row.dueDate | timespanToString}}
    </span>
  </ng-template>

  <ng-template cellTemplateForColumn="sum"
               let-row="row">
    <span>{{row.sum | currencyToString}}</span>
  </ng-template>

  <ng-template #rightToolbarPanelTemplate>
    <button mat-icon-button
            matTooltip="Zmień hasło"
            (click)="changePassword()">
      <span class="material-icons"
            inline=true>lock</span>
    </button>
    <button mat-icon-button
            matTooltip="Wyloguj"
            (click)="logout()">
      <span class="material-icons"
            inline=true>power_settings_new</span>
    </button>
    <button mat-icon-button
            matTooltip="Zapłacony"
            (click)="payBill()">
      <span class="material-icons"
            inline=true>check</span>
    </button>
  </ng-template>

  <ng-template #expandedRowTemplate
               let-row="row">
    <app-bill-edit [bill]="getBillById(row.id)"
                   [bills]="data()"
                   [newBill]="false"
                   [editMode]="editMode()"
                   [showSaveAndClose]="false"
                   class="bill-details"
                   (editModeChange)="onEditModeChange($event)">
    </app-bill-edit>
  </ng-template>

</app-table>
