<div class="parent">
  <div class="container">
    @if (!emailSent()) {
    <form [formGroup]="form"
          class="container-form"
          (ngSubmit)="onSubmit()">
      <h2 class="message">Resetowanie hasła</h2>
      <p class="info">Podaj adres e-mail powiązany z kontem. Wyślemy link do zmiany hasła.</p>

      <app-input-text [formGroup]="form"
                      [path]="['email']"
                      [type]="'email'"
                      [descriptionProvider]="getDescriptionProvider()"
                      class="full-width">
      </app-input-text>

      <button mat-raised-button
              type="submit"
              color="primary"
              [disabled]="!form.valid || loading()">Wyślij link</button>

      <a routerLink="/login"
         class="link">Powrót do logowania</a>
    </form>
    } @else {
    <div class="container-form">
      <h2 class="message">E-mail wysłany!</h2>
      <p class="info">Sprawdź swoją skrzynkę pocztową i kliknij w link, aby ustawić nowe hasło.</p>
      <a routerLink="/login"
         class="link">Powrót do logowania</a>
    </div>
    }
  </div>
</div>
