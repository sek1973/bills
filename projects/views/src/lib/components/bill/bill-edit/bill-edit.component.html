<div class="form-grid">
        <app-input-text [formGroup]="form"
                        [editMode]="editMode()"
                        [path]="['name']"
                        [descriptionProvider]="descriptionProvider">
        </app-input-text>
        <app-input-text [formGroup]="form"
                        [editMode]="editMode()"
                        [path]="['description']"
                        [descriptionProvider]="descriptionProvider">
        </app-input-text>
        <app-input-hyperlink [formGroup]="form"
                             [editMode]="editMode()"
                             [path]="['url']"
                             [descriptionProvider]="descriptionProvider">
        </app-input-hyperlink>
        <app-input-text [formGroup]="form"
                        [editMode]="editMode()"
                        [path]="['login']"
                        [descriptionProvider]="descriptionProvider">
        </app-input-text>
        <app-input-text [formGroup]="form"
                        [editMode]="editMode()"
                        type="number"
                        [path]="['repeat']"
                        [descriptionProvider]="descriptionProvider">
        </app-input-text>
        <app-input-select [formGroup]="form"
                          [editMode]="editMode()"
                          [path]="['unit']"
                          [descriptionProvider]="descriptionProvider"
                          [selectItems]="unitEnumItems">
        </app-input-select>
        <app-input-currency [formGroup]="form"
                            [editMode]="editMode()"
                            [path]="['sum']"
                            [descriptionProvider]="descriptionProvider">
        </app-input-currency>
        <app-input-percent [formGroup]="form"
                           [editMode]="editMode()"
                           type="number"
                           [path]="['share']"
                           [descriptionProvider]="descriptionProvider">
        </app-input-percent>
        <app-input-text [formGroup]="form"
                        [editMode]="editMode()"
                        [path]="['position']"
                        [descriptionProvider]="descriptionProvider">
        </app-input-text>

</div>
