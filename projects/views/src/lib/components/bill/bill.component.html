<div class="bill-view">
  <div class="bill-titlebar">
    <div class="bill-title">
      <button mat-icon-button
              matTooltip="Zestawienie"
              [routerLink]="['/zestawienie']"
              routerLinkActive="active">
        <span class="material-icons"
              inline=true>arrow_back
        </span>
      </button>
      <span>
        {{getTitle()}}
      </span>
    </div>
    <div class="bill-toolbar">
      @if (editMode()) {
      <button mat-raised-button
              color="accent"
              class="toolbar-button"
              (click)="cancel()">
        <span class="material-icons btn-icon">close</span>
        <span class="btn-text">Anuluj</span>
      </button>
      }
      @if (editMode()) {
      <button mat-raised-button
              color="warn"
              class="toolbar-button"
              (click)="deleteBill()">
        <span class="material-icons btn-icon">delete</span>
        <span class="btn-text">Usuń</span>
      </button>
      }
      @if (editMode()) {
      <button mat-raised-button
              color="primary"
              class="toolbar-button"
              [disabled]="!billEdit()?.canSave()"
              (click)="saveBill()">
        <span class="material-icons btn-icon">save</span>
        <span class="btn-text">Zapisz</span>
      </button>
      }
      @if (editMode() && billEdit()?.showSaveAndClose()) {
      <button mat-raised-button
              color="primary"
              class="toolbar-button"
              [disabled]="!billEdit()?.canSave()"
              (click)="saveBillAndClose()">
        <span class="material-icons btn-icon">done_all</span>
        <span class="btn-text">Zapisz i zamknij</span>
      </button>
      }
      @if (!editMode()) {
      <button mat-raised-button
              color="primary"
              class="toolbar-button"
              (click)="editBill()">
        <span class="btn-text btn-text-always">Edytuj</span>
      </button>
      }
      @if (!editMode()) {
      <button mat-raised-button
              color="primary"
              class="toolbar-button"
              (click)="payBill()">
        <span class="btn-text btn-text-always">Zapłacony</span>
      </button>
      }
    </div>
  </div>

  <app-bill-edit class="bill-details"
                 [bill]="bill()"
                 [bills]="bills()"
                 [editMode]="editMode()"
                 [newBill]="newBill()"
                 (editModeChange)="onEditModeChange($event)">
  </app-bill-edit>

  @if (!newBill()) {
  <mat-tab-group>
    <mat-tab label="Historia płatności">
      <app-payments class="bill-payments">
      </app-payments>
    </mat-tab>
    <mat-tab label="Planowane płatności">
      <app-schedules class="bill-schedules">
      </app-schedules>
    </mat-tab>
  </mat-tab-group>
  }

</div>
