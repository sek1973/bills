<app-table #table
           [data]="data()"
           [columnsDefinition]="columns"
           [expandable]="false"
           [pageable]="false"
           [rowStyle]="paymentRowStyle"
           [editable]="true"
           [canAdd]="true"
           [canPaste]="true"
           (rowActivated)="onRowActivated($event)"
           (refreshButtonClicked)="refresh()"
           (addButtonClicked)="addPayment()"
           (editButtonClicked)="editPayment()"
           (deleteButtonClicked)="deletePayment()"
           (rowDblClick)="editPayment()"
           (pasteButtonClicked)="pasteData()">
  <ng-template #tableTitleTemplate>
    <span class="table-title">Historia płatności</span>
  </ng-template>
  <ng-template cellTemplateForColumn="deadline"
               let-row="row">
    {{row.deadline | timespanToString}}
  </ng-template>
  <ng-template cellTemplateForColumn="paiddate"
               let-row="row">
    {{row.paiddate | timespanToString}}
  </ng-template>
  <ng-template cellTemplateForColumn="sum"
               let-row="row">
    {{row.sum | currencyToString }}
  </ng-template>
  <ng-template cellTemplateForColumn="reminder"
               let-row="row">
    {{row.reminder | timespanToString }}
  </ng-template>
</app-table>
