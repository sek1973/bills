<div class="parent">
  <div class="container">
    <form [formGroup]="form"
          class="container-form"
          (ngSubmit)="onSubmit()">
      <h2 class="message">Ustawienie nowego hasła</h2>

      <app-input-password [formGroup]="form"
                          [path]="['newPassword']"
                          [descriptionProvider]="getDescriptionProvider()"
                          class="full-width">
      </app-input-password>

      <app-input-password [formGroup]="form"
                          [path]="['confirmPassword']"
                          [descriptionProvider]="getDescriptionProvider()"
                          class="full-width">
      </app-input-password>

      <button mat-raised-button
              type="submit"
              color="primary"
              [disabled]="!form.valid || loading()">Ustaw nowe hasło</button>

      <a routerLink="/login"
         class="link">Powrót do logowania</a>
    </form>
  </div>
</div>
