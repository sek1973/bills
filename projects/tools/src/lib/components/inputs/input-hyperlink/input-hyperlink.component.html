@if (visible()) {
<div class="form-item"
     [formGroup]="fieldFormGroup()">
  <mat-form-field class="form-field"
                  [floatLabel]="controlValue() ? 'always' : 'auto'">
    <mat-label>{{_labelText()}}</mat-label>
    @if (!editMode()) {
    <a class="hyperlink-overlay"
       target="_blank"
       rel="noopener noreferrer"
       [appAddHrefAttribute]="true"
       [appAddHrefAttributeLink]="externalUrl()">{{controlValue()}}</a>
    <input matInput
           class="hidden-input"
           [id]="fieldName()"
           [formControlName]="fieldName()">
    } @else {
    <input matInput
           [matTooltip]="_tooltipText()"
           [matTooltipShowDelay]="tooltipShowDelayValue"
           [matTooltipHideDelay]="tooltipHideDelayValue"
           [id]="fieldName()"
           [formControlName]="fieldName()"
           [placeholder]="_placeholderText()">
    }
    <mat-error>
      {{getErrorMessage(path())}}
    </mat-error>
  </mat-form-field>
</div>
}
